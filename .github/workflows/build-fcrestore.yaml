name: Build and Update FC Restore CLI

on:
  workflow_dispatch:

jobs:
  update-cli:
    runs-on: ubuntu-latest
    name: Build All Binaries and Open PR

    steps:
      - name: Checkout fc-scripts
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone press repo (contains fcrestore)
        run: |
          git clone https://github.com/frappe/press.git
          cp -r press/libs/fcrestore ./fcrestore-src

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build all platform binaries
        run: |
          mkdir -p fcrestore/dist
          cd fcrestore-src
          platforms=(
            "linux amd64"
            "linux arm64"
            "windows amd64"
            "windows arm64"
            "darwin amd64"
          )
          for platform in "${platforms[@]}"; do
            read -r GOOS GOARCH <<< "$platform"
            OUTPUT="../fcrestore/dist/fcrestore-${GOOS}-${GOARCH}"
            if [ "$GOOS" = "windows" ]; then OUTPUT="$OUTPUT.exe"; fi
            echo "Building for $GOOS/$GOARCH"
            GOOS=$GOOS GOARCH=$GOARCH go build -o "$OUTPUT" .
          done

      - name: Commit and push binaries
        run: |
          BRANCH="update-fcrestore-$(date +%s)"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -b $BRANCH
          git add fcrestore/dist
          git commit -m "feat(fcrestore): update CLI binaries"
          git push origin $BRANCH
          echo "branch=$BRANCH" >> $GITHUB_ENV

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "feat(fcrestore): Update CLI binaries" \
            --body "This PR updates the \`fcrestore/dist\` directory with fresh binaries for all platforms." \
            --head "${{ env.branch }}" \
            --base master
